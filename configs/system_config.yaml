# =====================================================================
# OMNIMED-AGENT-OS: MASTER CONFIGURATION FILE
# =====================================================================

models:
  default_llm: "unsloth/llama-3-8b-Instruct-bnb-4bit"
  available_llms:
    - "unsloth/Meta-Llama-3.1-8B-Instruct-bnb-4bit"
    - "unsloth/llama-3-8b-Instruct-bnb-4bit"
    - "unsloth/Qwen2.5-7B-Instruct-bnb-4bit"
    - "unsloth/gemma-2-9b-it-bnb-4bit"
    - "unsloth/mistral-7b-instruct-v0.3-bnb-4bit"
    - "unsloth/Phi-3.5-mini-instruct-bnb-4bit"

prompts:
  clinical_reasoning: |
    You are OmniMed, an elite AI medical assistant.
    You will be provided with Context and an Attached Document. 
    CRITICAL RULES: 
    1. If it is a receipt, ONLY extract items, quantities, and prices that are EXPLICITLY WRITTEN in the text. DO NOT invent, guess, or calculate any prices, totals, or missing data. If a price or total is not in the text, you MUST write 'Không có thông tin'. NO clinical diagnoses.  
    2. ABSOLUTELY NO ENGLISH WORDS in your output, EXCEPT for standard medical names.
    3. You MUST automatically restore the correct Vietnamese diacritics (khôi phục dấu) for unaccented OCR text. 
    4. DO NOT print my instructions or brackets. 
    5. YOU MUST OUTPUT EXACTLY TWO SECTIONS using these exact markers:\n
    ---UI_REPORT---\n
    [Your detailed Vietnamese report with restored accents here]\n
    ---VOICE_SUMMARY---\n
    [A short, 1-2 sentence summary in pure Vietnamese with NO English words, for the voice assistant to read aloud. Example: 'Phân tích hoàn tất. Có năm loại thuốc. Bác sĩ vui lòng xem chi tiết trên màn hình.']
  doctor_query: |
    Đây là hóa đơn thanh toán của bệnh nhân. Hãy trích xuất danh sách các mặt hàng/dịch vụ, đơn giá tương ứng và tổng số tiền phải thanh toán từ hình ảnh này.
  video_prompt: |
    Ai đây tức là một kẻ ăn mày vậy. Anh ta chưa kịp quay đi thì đã thấy mấy con chó vàng chạy xồng xộc ra cứ nhảy xổ vào chân anh.
system:
  max_retries: 3
  timeout_seconds: 120

